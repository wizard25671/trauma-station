- type: entity
  abstract: true
  id: CMPlatformBase
  name: platform
  description: A raised surface. Wait, thats illegal!
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _Starlight/Structures/platforms.rsi
    drawdepth: HighFloorObjects
  - type: InteractionOutline
  - type: Clickable
  - type: RCDDeconstructable
    cost: 5
    delay: 7
    fx: EffectRCDDeconstruct8
  - type: Damageable
    damageModifierSet: StructuralMetallic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 175
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: CMPlatformBase
  id: CMPlatform
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    state: platform
  - type: Climbable
  - type: ChildEntities
    childPrototypes:
      - prototype: OverlayCMPlatform


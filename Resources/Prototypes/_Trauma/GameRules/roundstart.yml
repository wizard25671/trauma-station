# i love this dogshit system nobody has improved for 2 years :)
- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleNoHeretic
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 0.5
    - id: Devil
      prob: 0.02
    - id: Shadowling
      prob: 0.02
    - id: SubWraith
      prob: 0.02

- type: entity
  parent: BaseGameRule
  id: Insurgency
  components:
  - type: GameRule
    minPlayers: 5 # no insurgents on deadpop
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Trauma/Shuttles/insurgents.yml
  - type: AntagObjectives
    objectives:
    - InsurgentEscapeObjective
    #- InsurgentAllSurviveObjective # TODO
  - type: AntagLoadProfileRule
    speciesOverride: Human
    speciesOverrideBlacklist:
    - Plasmaman # instantly dies
  - type: InsurgencyRule
  - type: AntagSelection
    selectionTime: PrePlayerSpawn # need to move them to their shittle
    agentName: insurgent-round-end-agent-name
    definitions:
    - prefRoles: [ Insurgent ]
      spawnerPrototype: GhostRoleSpawnerInsurgent
      startingGear: Insurgent
      unequipOldGear: true
      max: 4
      playerRatio: 10
      roleLoadout:
      - RoleSurvivalStandard
      components:
      - type: RandomHumanoidAppearance
        randomizeName: true
      mindRoles:
      - MindRoleInsurgent

- type: entity
  parent: BaseGameRule
  id: SubTraitorRandom
  components:
  - type: SubGamemodes
    rules:
    - id: SubTraitor
      prob: 0.5

- type: entity
  parent: BaseGameRule
  id: HereticGamemode
  components:
  - type: HereticRule
  - type: GameRule
    minPlayers: 15
  - type: AntagObjectives
    objectives:
    - HereticKnowledgeObjective
    - HereticSacrificeObjective
    - HereticSacrificeHeadObjective
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: heretic-roundend-name
    definitions:
    - prefRoles: [ Heretic ]
      max: 6
      playerRatio: 10
      lateJoinAdditional: true
      blacklist:
        components:
        - CommandStaff
      mindRoles:
      - MindRoleHeretic

- type: entity
  parent: BaseShadowlingRule
  id: ShadowlingGamemode
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    definitions:
    - prefRoles: [ Shadowling ]
      max: 3
      playerRatio: 25
      blacklist:
        components:
        - CommandStaff
      mindRoles:
      - MindRoleShadowling

- type: entity
  id: TraitorReinforcementNukeOps
  parent: TraitorReinforcement
  components:
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: InstallHypoportNukie
    - !type:NestedEffect
      proto: InstallSkillChipNukie

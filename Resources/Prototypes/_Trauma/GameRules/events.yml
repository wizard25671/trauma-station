- type: entity
  parent: BaseGameRule
  id: CarpMigrationRule
  components:
  - type: StationEvent
    duration: 1
    weight: 1
  - type: CarpMigrationRule
  - type: SpaceSpawnRule

- type: entity
  parent: BaseGameRule
  id: RadiationStormRule
  components:
  - type: StationEvent
    weight: 0.5
    startAnnouncement: station-event-radiation-storm-announcement
    minimumPlayers: 25
    reoccurrenceDelay: 20
    maxOccurrences: 3
    duration: 1
  - type: RadiationStormRule
  - type: MapEffectsRule
    effects:
    - !type:ModifyStatusEffect
      effectProto: WeatherSchedulerRadiationStorm
      time: null # it removes itself when done

- type: entity
  id: RatmaSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    minimumPlayers: 30
    weight: 3
    duration: 5
    reoccurrenceDelay: 30
  - type: VentHordeRule
    table:
      id: MobRatma
      amount: 1, 1

- type: entity
  id: WailingHorseSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    minimumPlayers: 30
    weight: 3
    duration: 5
    reoccurrenceDelay: 30
  - type: VentHordeRule
    table:
      id: MobWailingHorse
      amount: 1, 1

- type: entity
  id: CoconutCrabSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    minimumPlayers: 15
    weight: 5
    duration: 5
    reoccurrenceDelay: 30
  - type: VentHordeRule
    table: !type:GroupSelector
      rolls: 6, 8
      children:
      - id: MobCoconutCrab
      - id: MobCrabTiny
        weight: 0.625 # Not as scary so make rarer in the event, shrimple as.
      - id: MobCoconutCrabFloofy # because it looks funny
        weight: 0.05 # NEVER BASICALLY

- type: entity
  id: FugitiveSpawn
  parent: BaseGameRule
  components:
  - type: StationEvent
    weight: 10
    duration: null
    earliestStart: 10
    minimumPlayers: 30
    reoccurrenceDelay: 30
    maxOccurrences: 2
  - type: FugitiveRule
  - type: MaintsSpawnRule
  - type: AntagGhostCharacterRule
  - type: AntagObjectives
    objectives:
    - FugitiveEscapeObjective
    - FugitiveKillObjective
  - type: AntagSelection
    agentName: ghost-role-information-fugitive-name
    definitions:
    - spawnerPrototype: SpawnPointGhostRoleFugitive
      min: 2
      max: 2
      pickPlayer: false
      startingGear: FugitiveAntagGear
      briefing:
        text: fugitive-role-greeting
        color: red
      components:
      - type: NpcFactionMember
        factions:
        - Syndicate
      - type: AutoImplant
        implants:
        - UplinkImplant
      - type: RandomMetadata
      - type: EmitSoundOnSpawn # fell out of the ceiling
        sound: /Audio/Effects/clang.ogg
      mindRoles:
      - MindRoleGhostRoleFugitive
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: TraitorSkills


- type: entity
  id: FugitiveHunterRule
  parent: BaseGameRule
  components:
  - type: AntagGhostCharacterRule
  - type: AntagObjectives
    objectives:
    - HunterKillFugitiveObjective
    - HunterArrestFugitiveObjective
    - HunterKillRandomPersonObjective
  - type: AntagRandomObjectives
    sets:
    - groups: HunterObjectiveGroups
      maxPicks: 3
    maxDifficulty: 5
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Trauma/Shuttles/SpacePolShuttle.yml
  - type: AntagSelection
    agentName: ghost-role-information-hunter-name
    definitions:
    - spawnerPrototype: SpawnPointGhostRoleHunter
      min: 2
      max: 2
      pickPlayer: false
      startingGear: HunterAntagGear
      briefing:
        text: hunter-role-greeting
        color: red
      components:
      - type: NpcFactionMember
        factions:
        - Syndicate
      - type: AutoImplant
        implants:
        - FakeMindShieldImplant
        - DeathAcidifierImplant
      - type: RandomMetadata
      mindRoles:
      - MindRoleGhostRoleHunter
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: TraitorSkills

- type: entity
  id: ShadowCocoon
  name: shadow cocoon
  parent: BaseStructure
  description: A cocoon made out of darkness and blood.
  components:
  - type: Sprite
    sprite: _Trauma/Mobs/ShadowDemon/shadow_cocoon.rsi
    state: shadow_cocoon
  - type: EntityStorage
    capacity: 1
    openOnMove: false
  - type: Lock
    locked: true
    showLockVerbs: false
    showExamine: false
    breakOnAccessBreaker: false
    unlockOnClick: false
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/snap.ogg
  - type: ShadowCocoon
    randomSounds:
      collection: ShadowCocoonHallucinations
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Trauma/Mobs/ShadowDemon/shadownode.ogg
      params:
        volume: 0.7
  - type: AmbientSound
    range: 2
    volume: -2
    sound:
      path: /Audio/_Trauma/Mobs/ShadowDemon/shadownodeambientt.ogg

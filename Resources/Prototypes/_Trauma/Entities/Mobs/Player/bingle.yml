- type: entity
  id: MobBingleTrauma
  parent: MobBingle
  abstract: true
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Trauma/Mobs/Bingle/binglehunk.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: alive
    - map: ["enum.BingleVisual.Upgraded"]
      state: Upgraded
      visible: false
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 25
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:GibBehavior
        deleteGibs: true
        recursive: false
      - !type:SpawnEntitiesBehavior
        spawn:
          FoodMeatBingle:
            min: 1
            max: 3
  - type: GhostTakeoverAvailable
  - type: GhostRole
    name: ghost-role-information-bingle-name
    description: ghost-role-information-bingle-description
    rules: ghost-role-information-bingle-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: default
  - type: MobState
    allowedStates:
      - Alive

- type: entity
  id: MobBingleUpgradedTrauma
  parent: MobBingleTrauma
  abstract: true
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Trauma/Mobs/Bingle/binglehunk.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base", "movement" ]
      state: Upgraded
      visible: true

- type: entity
  id: BulletBingle
  name: acid spit
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Caustic: 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/xeno_toxic.rsi
    layers:
    - state: xeno_toxic
  - type: Ammo
    muzzleFlash: null

- type: entity
  id: MobBinglePrimeTrauma
  parent: MobBingleBoney
  suffix: Prime
  components:
  - type: Bingle
    prime: true
  - type: ScannableForPoints # NTR update, 5 points is the default.

- type: entity
  id: BulletBingleStrong
  name: strong acid spit
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Caustic: 10
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/xeno_toxic.rsi
    layers:
    - state: xeno_toxic
  - type: Ammo
    muzzleFlash: null
  - type: SmartLinkBlacklist  # Goobstation

- type: entity
  name: hunkish bingle
  id: MobBingleHunk
  parent: MobBingleTrauma
  description: This one is rather large.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _Trauma/Mobs/Bingle/binglehunk.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: alive
    - map: ["enum.BingleVisual.Upgraded"]
      state: Upgraded
      visible: false
  - type: Bingle
    upgradedID: MobBingleUpgradedHunk
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:GibBehavior
        deleteGibs: true
        recursive: false
      - !type:SpawnEntitiesBehavior
        spawn:
          FoodMeatBingle:
            min: 1
            max: 3
  - type: MeleeWeapon
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    wideAnimationRotation: 0
    animation: WeaponArcSlash
    damage:
      types:
        Blunt: 7
        Structural: 14 # breaks down the walls and airlocks in 10 hits
        Ion: 5
    bluntStaminaDamageFactor: 2.0
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 2
  - type: Stamina
    baseCritThreshold: 900
  - type: StaminaDamageOnHit
    damage: 15
    overtime: 40
    sound: /Audio/Weapons/egloves.ogg
  - type: PassiveDamage #passive Healing
    allowedStates:
    - Alive
    damage:
      types:
        Poison: -3
        Blunt: -1
        Slash: -1
        Piercing: -1
        Heat: -0.75
        Cold: -0.75
        Shock: -0.75
        Caustic: -0.75
  - type: Insulated


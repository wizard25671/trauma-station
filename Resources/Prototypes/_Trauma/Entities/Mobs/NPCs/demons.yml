- type: entity
  name: demon
  parent: [ MobSpaceBasic, MobCombat ]
  id: BaseDemon
  abstract: true
  description: It came from hell.
  components:
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseSprintSpeed: 4.5
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
  - type: FootstepModifier
  - type: Physics
    bodyType: KinematicController
  - type: MobThresholds
    thresholds:
      0: Alive
      1000: Dead
  - type: PassiveDamage
    allowedStates:
      - Alive
    damage:
      types:
        Heat: -1
        Blunt: -1
        Slash: -1
        Piercing: -1
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Sulfur
        Quantity: 100
    bleedReductionAmount: 1
  - type: Prying
    speedModifier: 5
    pryPowered: true
    useSound: /Audio/Machines/airlock_creaking.ogg
  - type: LanguageSpeaker
    speaks:
    - TauCetiBasic
    - Eldritch
    understands:
    - TauCetiBasic
    - Eldritch
  - type: ThermalVision
  - type: Stamina
    baseCritThreshold: 9999
  - type: FlashImmunity
  - type: Puller
    needsHands: false
  - type: GhostRole
    name: ghost-role-information-demon-name
    description: ghost-role-information-demon-desc
    rules: ghost-role-information-antagonist-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: short
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
  - type: GhostTakeoverAvailable
  - type: AlwaysTakeHoly
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: Targeting
  - type: Mutatable
    defaultMutations:
      MutationInternalMartyrdom: 0.1
      MutationSpatialInstability: 0.1
      MutationAntiGlow: 0.1
      MutationTelekinesis: 0.1
      MutationLaserEyes: 0.1
      MutationOrk: 0.05
      MutationFierySweat: 0.1
      MutationSpastic: 0.1
      MutationTwoLeftFeet: 0.1
      MutationAntenna: 0.1
      MutationAdrenalineRush: 0.1
      MutationDwarfism: 0.1
      MutationAcromegaly: 0.1
      MutationGigantism: 0.1
      MutationInsulated: 0.5
  - type: WarpPoint
  - type: PointLight
    radius: 0
    energy: 0

- type: entity
  id: ControlledDemon
  abstract: true
  components:
  - type: GhostRole
    name: ghost-role-information-demon-tame-name
    description: ghost-role-information-demon-tame-desc
    rules: ghost-role-information-familliar-rules
    mindRoles:
    - MindRoleGhostRoleFamiliar
    raffle:
      settings: short


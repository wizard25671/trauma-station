# Lit

- type: entity
  parent: BloomeryCold
  id: BloomeryLitBrass
  name: lit bloomery
  description: Loaded with brass, give it some time to burn and it will be ready.
  categories: [HideSpawnMenu]
  components:
  - type: Sprite
    state: burning
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 60000
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:SpawnEntitiesBehavior
          spawn:
            BloomeryCompleteBrass:
              min: 1
              max: 1
  - type: DamageOverTime
    damage:
      types:
        Slash: 1000
    interval: 1
  - type: Construction
    graph: BloomeryCold
    node: bloomerybrasslit
  - type: Damageable
    damageModifierSet: NormalMode
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: PointLight
    radius: 2
    energy: 3
    color: "#ff8227"


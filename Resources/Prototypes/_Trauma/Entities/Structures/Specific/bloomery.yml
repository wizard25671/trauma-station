# Unloaded

- type: entity
  parent: BaseStructure
  id: BloomeryCold
  name: unlit bloomery
  description: Needs to be loaded with charcoal and metal scraps before firing.
  components:
  - type: Animateable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageModifierSet: StructuralMetallic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          Brick1:
            min: 13
            max: 15
  - type: Sprite
    sprite: _Trauma/Structures/Forging/bloomery.rsi
    state: cold
  - type: Construction
    graph: BloomeryCold
    node: bloomery

# Loaded

- type: entity

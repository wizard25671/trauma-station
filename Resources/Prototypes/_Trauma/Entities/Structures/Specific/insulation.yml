- type: entity
  parent: BaseStructure
  id: WallInsulation
  name: insulation
  description: Noise blocking insulation.
  components:
  - type: Sprite
    sprite: _Trauma/Structures/insulation.rsi
    state: icon
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,-0.28125"
        density: 500
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialCloth1:
            min: 0
            max: 1
  - type: SoundBlocker
    soundBlockPercent: .95
  - type: InteractionOutline
  - type: Construction
    graph: WallInsulation
    node: insulation

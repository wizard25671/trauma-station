- type: entity
  abstract: true
  parent: BaseItem
  id: BaseModularGrenadeCase
  suffix: Empty Case
  components:
  - type: Sprite
    state: icon
  - type: Appearance
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: Item
    size: Small
  - type: Tag
    tags:
    - HandGrenade
  - type: PayloadCase
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:TimerStartBehavior
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    node: emptyCase
    deconstructionTarget: null

- type: entity
  parent: [BaseModularGrenadeCase, BaseSyndicateContraband]

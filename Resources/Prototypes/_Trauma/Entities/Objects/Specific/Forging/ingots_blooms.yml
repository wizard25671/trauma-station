# Gold

- type: entity
  abstract: true
  parent: BaseMetallicGold
  id: GoldOverheatable
  components:
  - type: BurnableFood
    burnTemp: 1337 # melting point since gold doesnt become brittle, it just melts
    burnedFoodPrototype: GoldMolten
    burnedPrefix: heated-name-text
    burnSound: null

- type: entity
  parent: [ BaseMetalScraps, BaseMetallicGold ]
  id: GoldScraps
  name: gold scraps
  description: Needs to be heated and shaped into a usable ingot. Gold has no impurities or oxides to need blooming.
  components:
  - type: Sprite
    layers:
    - state: gold
      shader: Emissive
  - type: Workable
    remaining: 50 # relatively soft metal
    result: GoldIngot
  - type: Construction
    graph: GoldScraps

- type: entity
  parent: MarkerBase
  id: GoldMolten
  name: molten gold spawner
  components:
  - type: PuddleSpawner
    solution:
      temperature: 1340 # a bit over the edge
      reagents:
      - ReagentId: Gold
        Quantity: 30

- type: entity
  parent: [ BaseWorkableGold, BaseMetalIngot, GoldOverheatable ]
  id: GoldIngot
  name: gold ingot
  description: A shiny and rare metal, can be forged at low temperatures. You wouldn't make a pickaxe out of this.
  components:
  - type: Sprite
    layers:
    - state: ingot_gold
      shader: Emissive
  - type: PhysicalComposition
    materialComposition:
      Gold: 250


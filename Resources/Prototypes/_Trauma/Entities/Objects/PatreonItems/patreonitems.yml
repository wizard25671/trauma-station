- type: entity
  parent: SimpleMobBase
  id: PatreonBumblebirb
  name: Dwingle
  description: It's dwingling itself.
  components:
  - type: LanguageSpeaker
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic
  - type: ReplacementAccent
    accent: dementia
  - type: Sprite
    drawdepth: SmallMobs
    sprite: _Trauma/Objects/Patreon/bumblebirb.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: icon
  - type: Item
    size: Tiny
  - type: HTN
    constantlyReplan: false
    rootTask:
      task: MouseCompound
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 1
        density: 50
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      30: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.5
    baseSprintSpeed : 5
  - type: DamageStateVisuals
    states:
      Alive:
        Base: icon
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Slime
        Quantity: 50
  - type: Edible
  - type: FlavorProfile
    flavors:
    - horrible
    - terrible
    - chewy
  - type: Hunger
    baseDecayRate: 0.25
  - type: Extractable
    grindableSolutionName: food
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Slime
          Quantity: 50
  - type: Butcherable
    spawned:
    - id: FoodMeatSlime
  - type: Damageable
  - type: Injurable
    damageContainer: Biological
  - type: Tag
    tags:
    - Trash
    - VimPilot
  - type: NonSpreaderZombie
  - type: MeleeWeapon
    soundHit:
      path: /Audio/_Trauma/Patreon/DWINGLE.ogg
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 0
  - type: NPCRetaliation
    attackMemoryLength: 5
  - type: GroupRetaliation
    range: 5


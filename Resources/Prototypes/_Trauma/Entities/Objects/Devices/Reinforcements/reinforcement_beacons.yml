- type: entity
  abstract: true
  id: BaseReinforcementBeacon
  name: reinforcement beacon
  description: A reinforcement beacon placed by a nanotrasen command member, it can be destroyed to prevent the reinforcement from arriving.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/reinforcement_callers/reinforcement_beacon.rsi
    state: icon
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: EmitSoundOnCollide
    sound:
      collection: WeakHit
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Effects/drop.ogg
      params:
        volume: 2
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: DelayedGhostRole
    description: ghost-role-information-reinforcement-description
    rules: ghost-role-information-nonantagonist-rules
    mindRoles:
    - MindRoleGhostRoleNeutral
  - type: GhostCharacterSpawner
    components:
    - type: IdBind
    - type: Loadout
      roleLoadout: [ RoleSurvivalStandard ]
  - type: Transform
    anchored: true


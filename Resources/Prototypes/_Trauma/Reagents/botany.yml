- type: reagent
  id: PotassiumSulfate
  name: reagent-name-potassium-sulfate
  group: Botanical
  desc: reagent-desc-potassium-sulfate
  flavor: bitter
  physicalDesc: reagent-physical-desc-chalky
  color: "#c9c3c3"
  plantMetabolism:
    - !type:PlantAdjustNutrition
      amount: 6 # similar to potash but has sulfur, hard to make anyways
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateHunger
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Plant ]

- type: reagent
  id: AmmoniumNitrate
  name: reagent-name-ammonium-nitrate
  group: Botanical
  desc: reagent-desc-ammonium-nitrate
  physicalDesc: reagent-physical-desc-odorless
  flavor: bitter
  color: white
  meltingPoint: 442.8
  boilingPoint: 483
  plantMetabolism:
    - !type:PlantAdjustNutrition
      amount: 1
    - !type:PlantAdjustHealth
      amount: 0.5
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Caustic: 1

- type: reagent
  id: UnstableCompound
  name: reagent-name-unstable-compound
  group: Botanical
  desc: reagent-desc-unstable-compound
  physicalDesc: reagent-physical-desc-odorless
  flavor: bitter
  color: "#2c4c3b"
  metabolisms:
    Bloodstream:
      effects:
      - !type:MutateDiseases
        mutationRate: 0.24
      - !type:HealthChange
        damage:
          types:
            Radiation: 4.5
  plantMetabolism:
  - !type:PlantAdjustMutationLevel
    amount: 3

- type: reagent
  id: ReaperDelight
  name: reagent-name-reaper-delight
  group: Botanical
  desc: reagent-desc-reaper-delight
  physicalDesc: reagent-physical-desc-sickly
  flavor: bitter
  color: Black
  plantMetabolism:
  - !type:PlantAdjustHealth
    amount: -5
  - !type:PlantAdjustToxins
    amount: 15
  - !type:PlantAdjustPotency
    amount: 1

- type: reagent
  id: Stellarium
  name: reagent-name-stellarium
  group: Botanical
  desc: reagent-desc-stellarium
  physicalDesc: reagent-physical-desc-starry
  flavor: medicine
  color : "#8000FF"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: -6
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: -15
  - !type:PlantAdjustHealth
    amount: 3

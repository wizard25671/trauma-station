- type: entity
  parent: [ BaseItem, BaseMagicalContraband ]
  id: CodexCicatrix
  suffix: MagicItem
  name: codex cicatrix
  description: This heavy tome is full of cryptic scribbles and impossible diagrams. According to legend, it can be deciphered to reveal the secrets of the veil between worlds.
  components:
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/book.rsi
    layers:
    - state: icon
      map: [ "base" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleAnimationVisuals.ToggleState:
        base:
          On: { state: icon-on }
          Off: { state: icon }
          TogglingOn: { state: icon-opening }
          TogglingOff: { state: icon-closing }
  - type: Item
    size: Small
    sprite: _Goobstation/Heretic/book.rsi
  - type: UseDelay
    delay: 2.0
  - type: Appearance
  - type: ItemToggle
  - type: ComponentToggler
    components:
    - type: HereticMagicItem
    - type: EldritchInfluenceDrainer
    - type: EnchantingTool
  - type: ItemToggleSize
    activatedSize: Normal
  - type: ToggleAnimation
  - type: Tag
    tags:
    - HereticItem
    - CodexCicatrix
    - AnchorHereticStructure
  - type: TransmutationRuneScriber

- type: entity
  parent: CodexCicatrix
  id: CodexMorbus
  name: codex morbus
  description: A hideous, ragged book covered in separately-blinking eyes, all of them staring at you. You have no idea how to hold this thing, and to be honest you're not sure if you want to.
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/book_morbus.rsi
    layers:
    - state: icon
      map: [ "base" ]
  - type: ComponentToggler
    components:
    - type: HereticMagicItem
    - type: EldritchInfluenceDrainer
      time: 2.5
    - type: EnchantingTool
  - type: ToggleAnimation
    toggleOnTime: 1.0
    toggleOffTime: 1.9
  - type: Tag
    tags:
    - HereticItem
    - AnchorHereticStructure
  - type: TransmutationRuneScriber
    time: 5
    runeDrawingEntity: HereticRuneRitualDrawAnimationMorbus
  - type: HereticCurseProvider
    cursePrototypes:
      StatusEffectCurseOfCorrosion:
        time: 90
      StatusEffectCurseOfParalysis:
        time: 150
      StatusEffectCurseOfFlames:
        time: 90
      StatusEffectCurseOfAmok:
        time: 90
      StatusEffectBlindness:
        time: 150
      StatusEffectCurseOfFragility:
        time: 300
        silent: true
  - type: UserInterface
    interfaces:
      enum.HereticCurseUiKey.Key:
        type: CurseBoundUserInterface

- type: entity
  parent: [ BaseItem, BaseMagicalContraband ]
  id: HereticPhylactery
  name: phylactery of damnation
  description: Used to steal blood from soon-to-be victims.
  components:
  - type: Item
    size: Tiny
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/Entities/phylactery.rsi
    layers:
      - state: phylactery
        map: [ "enum.SolutionContainerLayers.Base" ]
      - state: phylactery1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
  - type: Icon
    sprite: _Goobstation/Heretic/Entities/phylactery.rsi
    state: phylactery
  - type: Appearance
  - type: Tag
    tags:
    - HereticItem
  - type: Injector
    breakOnMove: false
    ignoreClosed: true
    interactionRangeOverride: 16
    allowedModes:
    - PhylacteryDrainMode
    activeModeProtoId: PhylacteryDrainMode
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: phylactery
    metamorphic: false
  - type: Solution
    id: injector
    solution:
      maxVol: 10
  - type: MixableSolution
    solution: injector
  - type: ExaminableSolution
    solution: injector
  - type: Spillable
    solution: injector
  - type: DrawableSolution
    solution: injector
  - type: RefillableSolution
    solution: injector
  - type: DrainableSolution
    solution: injector
  - type: SolutionTransfer
  - type: Forensics
    canStoreDNA: false
  - type: UseDelay
    delay: 0.5

- type: entity
  parent: [ DrinkBase, BaseMagicalContraband ]
  id: HereticEldritchFlask
  name: eldritch flask
  description: A flask filled with an unknown substance. Who knows what will happen when you take a sip from it.
  components:
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/items.rsi
    state: eldritch_flask
  - type: Icon
    sprite: _Goobstation/Heretic/items.rsi
    state: eldritch_flask
  - type: Solution
    solution:
        # it's a cryostasis flash filled with healing goodies what could possibly go wrong?
        # i will certainly not abuse it as a heretic chemist
        maxVol: 100
        canReact: false
        reagents:
        - ReagentId: EldritchEssence
          Quantity: 100
  - type: Tag
    tags:
    - HereticItem
    - EldritchFlask

- type: entity
  id: HereticProtectiveBlade
  name: eldritch blade
  description: Maelstrom of razors flashing right before your eyes. Why are you stopping to look at it!?
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Heretic/items.rsi
    state: protective_blade
  - type: Clickable
  - type: InteractionOutline
  - type: ProtectiveBlade
  - type: TimedDespawn
    lifetime: 60
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
    angularDamping: 0
    linearDamping: 0
    canCollide: False
  - type: Tag
    tags:
    - FollowerStayOnPolymorph
  - type: Reflect
    reflectProb: 1
    spread: 360
    reflects:
    - Energy
    - NonEnergy
    - Magic

- type: entity
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  id: HereticProtectiveBladeProjectile
  name: eldritch blade
  description: Maelstrom of razors flashing right before your eyes. Why are you stopping to look at it!?
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/items.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    impactEffect: BulletImpactEffectKinetic
    ignoreResistances: true
    damage:
      types:
        Slash: 25
        Structural: 100
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: Reflective
    reflective: Magic

- type: entity
  id: InkOfImaginination
  name: Ink of imaginination
  description: Call to the great minimal to bring forth true existence... A closing truth
  parent: BaseItem
  components:
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/book.rsi
    state: icon
  - type: Icon
    sprite: _Goobstation/Heretic/book.rsi
    state: icon
  - type: SpawnItemsOnUse
    items:
    - id: EldritchInfluence
    - id: EldritchInfluence
  - type: Tag
    tags:
    - HereticItem

- type: entity
  parent: [BaseItem, BaseMagicalContraband]
  id: LabyrinthHandbook
  name: labyrinth handbook
  description: A book containing the laws and regulations of the Locked Labyrinth, penned on an unknown substance. Its pages squirm and strain, looking to lash out and escape.
  components:
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/Entities/heretichandbook.rsi
    layers:
    - state: icon
  - type: Item
    size: Small
    sprite: _Goobstation/Heretic/book.rsi
  - type: UseDelay
  - type: HolosignProjector
    signProto: WallLabyrinth
  - type: LimitedCharges
    maxCharges: 5
  - type: AutoRecharge
    rechargeDuration: 15
  - type: LabyrinthHandbook
  - type: Tag
    tags:
    - HereticItem

- type: entity
  parent: [BaseItem, BaseMagicalContraband]
  id: LanternHeretic
  name: cracked lantern
  description: It is said that the noon stones are not the same as before. That is not true. I will collect my tears in a bowl. I will use them to ignite an ancient flame. Light, wait for me.
  components:
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/Entities/lantern.rsi
    layers:
    - state: icon
  - type: Item
    sprite: _Goobstation/Heretic/Entities/lantern.rsi
  - type: Flash
    flashOnMelee: false
    aoeFlashDuration: 4.0
  - type: UseDelay
    delay: 5
  - type: PointLight
    radius: 8
    energy: 6
    color: "#13800E"
  - type: StealTarget
    stealGroup: LAMP
  - type: Clothing
    sprite: Objects/Tools/lantern.rsi
    equippedPrefix: off
    quickEquip: false
    slots:
    - Belt
  - type: MeleeWeapon
    angle: 0
    damage:
      types:
        Blunt: 0
  - type: IgniteOnFlash
    fireStacks: 2
    fireProtectionPenetration: 0.35
  - type: AlwaysHot
  - type: CrackedLantern
  - type: Tag
    tags:
    - HereticItem

- type: entity
  id: LanternHereticSummon
  name: hint
  description: Strange creature that seems to feel more comfortable behind you.
  categories: [ HideSpawnMenu ]
  components:
  - type: CombatMode
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: ShadowDemonPunch
    animation: WeaponArcShadowClaw
    damage:
      types:
        Blunt: 4
        Slash: 4
        Piercing: 4
        Heat: 4
  - type: BackStab
    damageMultiplier: 1.5
  - type: CrackedLanternSummon
  - type: Damageable
  - type: Injurable
    damageContainer: Biological
  - type: AlwaysTakeHoly
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Heretic/Mobs/hint.rsi
    layers:
    - state: smol_progenitor
  - type: Physics
    bodyType: Dynamic
    bodyStatus: InAir
    linearDamping: 0.5
    ignoreGravity: true
    canCollide: false
  - type: TileFrictionModifier
    modifier: 0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 25
  - type: Tag
    tags:
    - WideSwingIgnore
  - type: FactionException
  - type: NpcFactionMember
    factions:
    - Heretic
  - type: Targeting
  - type: Clickable
  - type: InteractionOutline

- type: entity
  parent: [BaseItem, BaseMagicalContraband]
  id: EldritchCoin
  name: eldritch coin
  description: A surprisingly heavy, ornate coin. Its sides seem to depict a different image each time you look.
  components:
  - type: Item
    size: Tiny
  - type: UnholyItem
  - type: Sprite
    sprite: _Goobstation/Heretic/Entities/eldritch_coin.rsi
    noRot: true
    layers:
    - state: heretic
      map: [ "enum.CoinFlipKey.Key" ]
  - type: Appearance
  - type: Tag
    tags:
    - HereticItem
  - type: StaticPrice
    price: 250
  - type: CoinFlip
    flippingSpriteState: flip
    flipTime: 1
    sides:
    - name: eldritch-coin-side-heretic
      spriteState: heretic
      userEffects:
      - !type:HealthChange
        damage:
          types:
            Heat: 10
        conditions:
        - !type:WhitelistCondition
          checkMind: true
          inverted: true
          whitelist:
            components:
            - Heretic
            - Ghoul
      - !type:RelayNearby
        conditions:
        - !type:WhitelistCondition
          checkMind: true
          whitelist:
            components:
            - Heretic
            - Ghoul
        compName: Door
        range: 5
        flags: Static
        effect: !type:ToggleDoorState
    - name: eldritch-coin-side-blade
      spriteState: blade
      userEffects:
      - !type:HealthChange
        damage:
          types:
            Blunt: 3
            Slash: 3
            Piercing: 3
        conditions:
        - !type:WhitelistCondition
          checkMind: true
          inverted: true
          whitelist:
            components:
            - Heretic
            - Ghoul
      - !type:RelayNearby
        conditions:
        - !type:WhitelistCondition
          checkMind: true
          whitelist:
            components:
            - Heretic
            - Ghoul
        compName: DoorBolt
        range: 5
        flags: Static
        effect: !type:ToggleDoorBolts

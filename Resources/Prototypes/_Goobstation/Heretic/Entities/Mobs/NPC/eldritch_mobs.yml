- type: entity
  parent: [OrganBaseTorso, OrganAnimalSpriteExternal]
  id: OrganTorsoGhoul
  components:
  - type: BodyPart
    slots: []
  - type: Woundable
    boneEntity: null
  - type: Destructible
    thresholds: []

- type: entity
  parent:
  - BaseSimpleMob
  - MobAtmosExposed
  - MobCombat
  - MobFlammable
  id: BaseMobHereticSummon
  abstract: true
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 4.5
    baseSprintSpeed: 4.5
  - type: InputMover
  - type: MobMover
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
  - type: NpcFactionMember
    factions:
    - Heretic
  - type: Physics
    bodyType: KinematicController
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 250
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical
      100: Dead
  - type: Damageable
  - type: Injurable
    damageContainer: Biological
  - type: MeleeWeapon
    altDisarm: false
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh1.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 12
        Piercing: 8
  - type: NoSlip
  - type: Grammar
    attributes:
      gender: male
  - type: CollectiveMind
    defaultChannel: MansusLink
    channels:
    - MansusLink
  - type: Targeting
  - type: Climbing
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - Electrocution
    - TemporaryBlindness
    - Pacified
    - StaminaModifier
    - Flashed
    - RadiationProtection
    - Adrenaline
  - type: FloatingVisuals
  - type: LanguageSpeaker
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic

- type: entity
  id: BaseMobHereticGhoul
  abstract: true
  components:
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghostrole-ghoul-name
    description: ghostrole-ghoul-desc
    rules: ghostrole-ghoul-rules
    mindRoles:
    - MindRoleGhoul
    raffle:
      settings: short
  - type: Ghoul
  - type: HTN
    rootTask:
      task: HereticSummonCompound
    blackboard:
      NavSmash: !type:Bool
        true
  - type: NameIdentifier
    group: GenericNumber

- type: entity
  id: BaseMobGhoulLock
  abstract: true
  components:
  - type: Aura
    auraColor: "#53277e"
    auraFarm: 1
    distortion: 0.03

- type: entity
  parent: [BaseMobHereticSummon, BaseMobAnimal]
  id: MobGhoulStalkerBase
  name: flesh stalker
  description: An abomination cobbled together from varied remains. Its appearance changes slightly every time you blink.
  abstract: true
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/eldritch_mobs.rsi
    state: stalker
  - type: FlashImmunity
  - type: MeleeWeapon
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 15
        Piercing: 10

- type: entity
  parent: [BaseMobHereticGhoul, MobGhoulStalkerBase]
  id: MobGhoulStalker
  components:
  - type: Ghoul
    totalHealth: 150
    ghostRoleName: ghostrole-stalker-name
    ghostRoleDesc: ghostrole-stalker-desc
  - type: GhostRole
    name: ghostrole-stalker-name
    description: ghostrole-stalker-desc
    mindRoles:
    - MindRoleGhoul
  - type: ActionGrant
    actions:
    - ActionHereticJaunt
    - ActionActivateEmp
    - ActionHereticShapeshift
  - type: ThermalVision
    thermalShader: null
    isActive: true
    color: white
    drawOverlay: false
    lightRadius: 0
    toggleAction: null

- type: entity
  parent: [BaseMobGhoulLock, MobGhoulStalkerBase]
  id: MobGhoulStalkerLock
  name: empowered flesh stalker
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 5.5
    baseSprintSpeed: 5.5
  - type: MobThresholds
    thresholds:
      0: Alive
      250: Critical
      260: Dead
  - type: MeleeWeapon
    damage:
      types:
        Slash: 20
        Piercing: 15

- type: entity
  parent: [BaseMobHereticSummon, BaseMobAnimal]
  id: MobGhoulProphetBase
  name: raw prophet
  description: An abomination stitched together from a few severed arms and one swollen, orphaned eye.
  abstract: true
  components:
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Heretic/eldritch_mobs.rsi
    layers:
    - map: [ "movement" ]
      state: raw_prophet
  - type: SpriteMovement
    movementLayers:
      movement:
        state: raw_prophet-move
    noMovementLayers:
      movement:
        state: raw_prophet
  - type: HealingAura
    selfHealMultiplier: 2
    componentHealMultipliers:
      FleshPassive: 1
      Ghoul: 2
  - type: ContentEye
    maxZoom: 1.25, 1.25
    targetZoom: 1.25, 1.25
  - type: ShowHealthBars
  - type: ShowHealthIcons

- type: entity
  parent: [BaseMobHereticGhoul, MobGhoulProphetBase]
  id: MobGhoulProphet
  components:
  - type: ActionGrant
    actions:
    - ActionHereticJauntLong
    - ActionHereticMansusLink
  - type: Ghoul
    totalHealth: 65
    ghostRoleName: ghostrole-prophet-name
    ghostRoleDesc: ghostrole-prophet-desc
  - type: GhostRole
    name: ghostrole-prophet-name
    description: ghostrole-prophet-desc
    mindRoles:
    - MindRoleGhoul
  - type: NightVision
    color: white
    activateSound: null
    deactivateSound: null
    drawOverlay: false
  - type: Eye
    drawFov: false

- type: entity
  parent: [BaseMobGhoulLock, MobGhoulProphetBase]
  id: MobGhoulProphetLock
  name: empowered raw prophet
  components:
  - type: HealingAura
    componentHealMultipliers:
      Ghoul: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      110: Dead
  - type: MeleeWeapon
    damage:
      types:
        Slash: 20
        Piercing: 15

- type: entity
  parent: [BaseMobHereticSummon, FlyingMobBase]
  id: MobGhoulMirrorMaidBase
  name: maid in the mirror
  description: A floating and flowing wisp of chilled air. Glancing at it causes it to shimmer slightly.
  abstract: true
  components:
  - type: Body
  - type: InitialBody
    organs:
      Torso: OrganTorsoGhoul
  - type: Sprite
    sprite: _Goobstation/Heretic/eldritch_mobs.rsi
    state: maid
  - type: ActionGrant
    actions:
    - ActionMirrorJaunt
  - type: MirrorMaid
  - type: MovementSpeedModifier
    baseWalkSpeed: 5
    baseSprintSpeed: 5
  - type: FlashImmunity
  - type: NightVision
    color: aquamarine
    activateSound: null
    deactivateSound: null
  - type: MeleeWeapon
    animation: WeaponArcPunch
    soundHit:
      collection: GlassBreak
    damage:
      types:
        Slash: 10
        Piercing: 10
  - type: RangedDamageSound
    soundGroups:
      Brute:
        collection:
          GlassBreak
    soundTypes:
      Heat:
        collection:
          MeatLaserImpact
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 25
        mask:
          - Opaque # Can go through windows
        layer:
          - FlyingMobLayer
  - type: Reflect # It's a mirror
    reflectProb: 1
    reflects:
      - Energy
  - type: PassiveDamage
    allowedStates:
    - Alive
    damage:
      types:
        Blunt: -1
        Slash: -1
        Piercing: -1
        Heat: -1
        Cold: -1
        Shock: -1
        Asphyxiation: -1
        Bloodloss: -1
        Caustic: -1
        Poison: -1
        Radiation: -1
        Cellular: -1
        Holy: -1
  - type: Insulated
  - type: Damageable
    damageModifierSet: MirrorMaid
  - type: Injurable
    damageContainer: InorganicMetaphysical
  - type: MovementIgnoreGravity

- type: entity
  parent: [BaseMobHereticGhoul, MobGhoulMirrorMaidBase]
  id: MobGhoulMirrorMaid
  components:
  - type: Ghoul
    spawnOnDeathPrototype: ShardGlass
    totalHealth: 80
    ghostRoleName: ghostrole-maid-name
    ghostRoleDesc: ghostrole-maid-desc
  - type: GhostRole
    name: ghostrole-maid-name
    description: ghostrole-maid-desc
    mindRoles:
    - MindRoleGhoul

- type: entity

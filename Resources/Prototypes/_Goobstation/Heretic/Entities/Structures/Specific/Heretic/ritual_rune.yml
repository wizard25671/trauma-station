- type: entity
  id: HereticRuneRitual
  name: transmutation rune
  description: An ancient drawing used by sinister individuals for sacrifices.
  placement:
    mode: SnapgridCenter
  components:
  - type: HereticRitualRune
  - type: Sprite
    drawdepth: FloorEffects
    sprite: _Goobstation/Heretic/ritual_rune.rsi
    layers:
    - state: overlay # Required so that you don't miss the rune when clicking on it
      color: "#FFFFFF01"
    - state: icon
  - type: Clickable
  - type: UserInterface
    interfaces:
      enum.HereticRitualRuneUiKey.Key:
        type: HereticRitualRuneBoundUserInterface
      enum.FeastOfOwlsUiKey.Key:
        type: FeastOfOwlsBoundUserInterface
      enum.HereticGhoulRecallKey.Key:
        type: GhoulRecallBoundUserInterface
  - type: IgnoresFingerprints
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Fixtures
    fixtures:
      rune:
        shape:
          !type:PhysShapeCircle
          radius: 1.5
        hard: false
        mask:
         - ItemMask
        layer:
         - SlipLayer
  - type: Physics
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_Goobstation/Heretic/runebreak.ogg
  - type: EnchantingTable
  - type: AtmosExposed
  - type: TemperatureTracker

- type: entity
  id: HereticRuneRitualDrawAnimation
  name: unfinished transmutation rune
  description: An unfinished ancient drawing used by sinister individuals for sacrifices.
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: FloorEffects
    sprite: _Goobstation/Heretic/ritual_rune.rsi
    state: icon_drawanim

- type: entity
  parent: HereticRuneRitualDrawAnimation
  id: HereticRuneRitualDrawAnimationMorbus
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/ritual_rune.rsi
    state: icon_drawanim_morbus

- type: entity
  id: HereticRuneRitualAnimation
  name: transmutation rune
  description: you shouldn't be seeing this description
  placement:
    mode: SnapgridCenter
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 1
  - type: Sprite
    drawdepth: HighFloorObjects
    sprite: _Goobstation/Heretic/ritual_rune.rsi
    state: icon_ritualanim

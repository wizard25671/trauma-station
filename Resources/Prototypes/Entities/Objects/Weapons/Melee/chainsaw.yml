- type: entity
  name: chainsaw
  parent: [BaseItem, KnifeDurabilitySharpenOnly] # Trauma
  id: Chainsaw
  description: A very large chainsaw. Usually you use this for cutting down trees... usually.
  components:
  - type: Wieldable
    wieldSound: !type:SoundPathSpecifier
      path: /Audio/Weapons/chainsawwield.ogg
      params:
        volume: -3
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/chainsaw.rsi
    state: icon
  - type: MeleeWeapon
    heavyStaminaCost: 10 # goob edit
    autoAttack: true
    angle: 0
    wideAnimationRotation: -135
    attackRate: 4
    damage:
      types:
        Slash: 2
        Blunt: 2
        Structural: 4
      woundSeverityMultipliers:
        Slash: 2
        Blunt: 2
    soundHit:
      path: /Audio/Weapons/chainsaw.ogg
      params:
        volume: -3
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 4
        Structural: 4
  - type: Item
    size: Large
    shape:
    - 0,0,2,2
    sprite: Objects/Weapons/Melee/chainsaw.rsi
  # <Trauma>
    shape:
    - 0,0,1,1
    - 1,1,4,1
    storedRotation: 45
    storedOffset: -15,6
  # </Trauma>

  - type: DisarmMalus
  - type: UseDelay
    delay: 1
  - type: BoneSaw # Shitmed
    speed: 0.5 # TODO: arm-mounted version becomes 0.65
  - type: SurgeryTool # Shitmed
    startSound:
      path: /Audio/Weapons/chainsawwield.ogg
    endSound:
      path: /Audio/Weapons/chainsaw.ogg

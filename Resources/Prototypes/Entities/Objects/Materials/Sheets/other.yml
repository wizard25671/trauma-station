- type: entity
  parent: SheetOtherBase
  id: SheetPlastic
  name: plastic
  suffix: Full
  components:
  - type: Tag
    tags:
    - Plastic
    - Sheet
    - DroneUsable # Goobstation
    - ConstructionMaterial
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100
  - type: Stack
    stackType: Plastic
    baseLayer: base
    layerStates:
    - plastic
    - plastic_2
    - plastic_3
  - type: Sprite
    state: plastic_3
    layers:
    - state: plastic_3
      map: ["base"]
  - type: Item
    heldPrefix: plastic
  - type: Solution
    solution:
      reagents:
      - ReagentId: Oil
        Quantity: 3 # Trauma - was 5
      - ReagentId: Phosphorus
        Quantity: 3 # Trauma - was 5
      - ReagentId: Microplastics # Trauma
        Quantity: 4


- type: entity
  abstract: true
  parent: BaseSheet
  id: SheetOtherBase
  description: A sheet of material, used often on the station in various applications.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Materials/Sheets/other.rsi # Trauma
  - type: Item
    sprite: _Trauma/Objects/Materials/Sheets/other.rsi # Trauma
    sprite: Objects/Materials/Sheets/other.rsi

- type: entity
  parent: SheetOtherBase
  id: SheetPaper
  name: paper
  suffix: Full
  components:
  # <Trauma>
  - type: Tag # remove drone/construction tags
    tags:
    - Sheet
  - type: Construction
    graph: SheetPaper
    node: paper sheet
  # </Trauma>
  - type: Stack
    stackType: Paper
    baseLayer: base
    layerStates:
    - paper
    - paper_2
    - paper_3
  - type: PhysicalComposition
    materialComposition:
      Paper: 100
  - type: Sprite
    state: paper_3
    layers:
    - state: paper_3
      map: ["base"]
  - type: Item
    heldPrefix: paper
  - type: Solution
    solution:
      reagents:
      - ReagentId: Cellulose
        Quantity: 5

- type: entity
  parent: SheetPaper
  id: SheetPaper1
  name: paper
  suffix: Single
  components:
  - type: Sprite
    state: paper
  - type: Stack
    count: 1


    transferAmount: 10
    solution: composite
  - type: BadFood
  - type: PhysicalComposition
    materialComposition:
      Uranium: 100
  - type: Stack
    stackType: Uranium
    baseLayer: base
    layerStates:
    - uranium
    - uranium_2
    - uranium_3
  - type: Sprite
    state: uranium_3
    layers:
    - state: uranium_3
      map: ["base"]
  - type: Item
    heldPrefix: uranium
  - type: Solution
    solution:
      reagents:
      - ReagentId: Uranium
        Quantity: 8
      - ReagentId: Radium
        Quantity: 2


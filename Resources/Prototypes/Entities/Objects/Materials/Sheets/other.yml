- type: entity
  parent: SheetOtherBase
  id: MaterialSheetMeat
  name: meat sheet
  suffix: Full
  components:
    - type: Sprite
      sprite: _Trauma/Objects/Materials/Sheets/meaterial.rsi # Trauma
      layers:
      - state: meat_3
        map: [ "base" ]
    - type: Tag
      tags:
      - Sheet
      - DroneUsable # Goobstation
    - type: Material
    - type: PhysicalComposition
      materialComposition:
        Meaterial: 100
    - type: Stack
      stackType: MeatSheets
      baseLayer: base
      layerStates:
        - meat
        - meat_2
        - meat_3
    - type: Item
      sprite: _Trauma/Objects/Materials/Sheets/meaterial.rsi # Trauma
      heldPrefix: meat
    - type: Solution
      solution:
        reagents:
        - ReagentId: Protein
          Quantity: 7
        - ReagentId: Fat
          Quantity: 3


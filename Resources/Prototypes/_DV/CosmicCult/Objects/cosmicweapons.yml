- type: entity
  name: entropic blade
  parent: [BaseSword, BaseCosmicContraband] # Trauma - Contraband marker (YES WE ARE MAKING A NEW ONE)
  id: SwordCosmicCult
  description: An eerie greatsword wrought of indescribable material, forcibly extruded down into reality. Your instincts tell you that it does not belong here.
  components:
  - type: CosmicEquipment
  - type: Sprite
    sprite: _DV/CosmicCult/Objects/cosmicsword.rsi
    layers:
      - state: icon
      - state: icon-overlay
        shader: unshaded
  - type: MeleeWeapon
    angle: 90
    animation: WeaponArcCosmic
    attackRate: 1
    clickDamageModifier: 1.1
    damage:
      types:
        Slash: 20
        Asphyxiation: 15
        Structural: 15
        Ion: 25
    soundHit:
      path: /Audio/_DV/CosmicCult/cosmicsword_hit.ogg
      params:
        variation: 0.2
        volume: 1
    soundSwing:
      path: /Audio/_DV/CosmicCult/cosmicweapon_swing.ogg
      params:
        variation: 0.125
        volume: -4
    soundNoDamage:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -1
  - type: DisarmMalus
  - type: Item
    size: Large
    shape:
    - 0,0,1,3
    storedRotation: -45
    sprite: _DV/CosmicCult/Objects/cosmicsword-inhands.rsi
  - type: UnholyItem # Goobstation Shitchap
  - type: CosmicTransmutable
    transmuteTo: null # No reforging
  - type: Parry
    maxParries: 2
    maxReflects: 0
    soundOnReflect:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -1
    soundOnParry:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -1

- type: entity
  name: vacuous lance
  parent: [BaseItem, BaseCosmicContraband]
  id: SpearCosmicCult
  description: An unnerving spear, wrought of indescribable material. Being near it feels like a prickle of static spreading through your nerves.
  components:
  - type: CosmicEquipment
  - type: Sprite
    sprite: _DV/CosmicCult/Objects/cosmiclance.rsi
    layers:
      - state: icon
      - state: icon-overlay
        shader: unshaded
  - type: MeleeWeapon
    range: 1.8 # Default is 1.5
    angle: 0
    animation: WeaponArcCosmic
    attackRate: 0.6
    damage:
      types:
        Piercing: 30
        Asphyxiation: 10
        Ion: 25
    animationRotation: 225
    wideAnimationRotation: 225
    soundHit:
      path: /Audio/_DV/CosmicCult/cosmiclance_hit.ogg
      params:
        variation: 0.2
        volume: 1
    soundSwing:
      path: /Audio/_DV/CosmicCult/cosmicweapon_swing.ogg
      params:
        variation: 0.125
        volume: -4
    soundNoDamage:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -1
  - type: DamageOtherOnHit
    damage:
      types: # Not a whole lot, you can throw them pretty damn quick if you set your keybinds right
        Piercing: 20
        Asphyxiation: 15
        Ion: 20
  - type: EmbeddableProjectile
    removalTime: 2
    sound: /Audio/_DV/CosmicCult/cosmiclance_impact.ogg
  - type: Wieldable
    wieldSound:
      path: /Audio/_DV/CosmicCult/cosmic_wield.ogg
      params:
        variation: 0.2
        volume: -2
    unwieldSound:
      path: /Audio/_DV/CosmicCult/cosmic_unwield.ogg
      params:
        variation: 0.2
        volume: 0
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 10
        Asphyxiation: 5
  - type: Item
    size: Large
    shape:
    - 0,0,5,0
    storedRotation: 45
    sprite: _DV/CosmicCult/Objects/cosmiclance-inhands.rsi
  - type: EmitSoundOnThrow
    sound: /Audio/_DV/CosmicCult/cosmicweapon_swing.ogg ## THROWING SOUND - REPLACE THIS!
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: Tag
    tags:
    - Spear
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
            - -0.40,-0.30
            - -0.30,-0.40
            - 0.40,0.30
            - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: UnholyItem # Goobstation Shitchap
  - type: Execution
    doAfterDuration: 4.0

- type: entity
  name: astral razor
  parent: [BaseItem, BaseCosmicContraband]
  id: ScytheCosmicCult
  description: An preternatural scythe, wrought of indescribable material. Even just looking at it makes you feel cold.
  components:
  - type: CosmicEquipment
  - type: Sprite
    sprite: _DV/CosmicCult/Objects/cosmicscythe.rsi
    layers:
      - state: icon
      - state: icon-overlay
        shader: unshaded
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 1 # Visual, doesn't do shit
  - type: LeechOnMarker
    leech:
      types:
        Blunt: -20
        Slash: -20
        Piercing: -20
        Heat: -20
        Cold: -20
        Shock: -20
        Caustic: -20
  - type: Gun
    projectileSpeed: 15
    soundGunshot: /Audio/_DV/CosmicCult/projectile_razor.ogg
    fireRate: 1
    useKey: true
    unaffectedBySkill: true # Cultists don't get shooting skill
  - type: AltFireMelee
    attackType: Heavy
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 1
    rechargeSound:
      path: /Audio/_DV/CosmicCult/projectile_razor_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileCosmicRazor
    capacity: 1
    count: 1
  - type: MeleeWeapon
    wideAnimationRotation: -135
    animation: WeaponArcCosmic
    attackRate: 1
    heavyStaminaCost: 0 # This thing is challenging enough to use already, and you can't lightswing anyway
    damage:
      types:
        Slash: 20
    soundHit:
      path: /Audio/_DV/CosmicCult/cosmicsword_hit.ogg
      params:
        variation: 0.2
        volume: 1
    soundSwing:
      path: /Audio/_DV/CosmicCult/cosmicweapon_swing.ogg
      params:
        variation: 0.125
        volume: -4
    soundNoDamage:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -11
  - type: Wieldable
    wieldSound:
      path: /Audio/_DV/CosmicCult/cosmic_wield.ogg
      params:
        variation: 0.2
        volume: -2
    unwieldSound:
      path: /Audio/_DV/CosmicCult/cosmic_unwield.ogg
      params:
        variation: 0.2
        volume: 0
  - type: GunRequiresWield
  - type: Item
    size: Ginormous
    sprite: _DV/CosmicCult/Objects/cosmicscythe-inhands.rsi
  - type: Clothing
    sprite: _DV/CosmicCult/Objects/cosmicscythe-inhands.rsi
    slots:
    - Back
    - suitStorage
  - type: UnholyItem # Goobstation Shitchap
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
    decapitation: true
  - type: Parry
    maxParries: 2
    maxReflects: 4
    soundOnReflect:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -1
    soundOnParry:
      path: /Audio/_DV/CosmicCult/cosmicsword_glance.ogg
      params:
        variation: 0.2
        volume: -1

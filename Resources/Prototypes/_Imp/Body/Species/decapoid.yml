- type: entity
  categories: [ HideSpawnMenu ]
  parent: BaseSpeciesAppearance
  id: AppearanceDecapoid
  name: Decapoid appearance
  components:
  - type: Inventory
    templateId: diona # Human but no shoes
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: jumpsuit
      outerClothing:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: jumpsuit
      head: # don't need mask, those are fine
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: jumpsuit
      gloves:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: gloves
      neck:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: neck
      suitstorage:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: back
      back:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Decapoid/displacement.rsi
            state: back
  - type: InitialBody
    organs:
      Torso: TorsoDecapoid
      Head: HeadDecapoid
      ArmRight: RightArmDecapoid
      ArmLeft: LeftArmDecapoid
      HandRight: RightHandDecapoid
      HandLeft: LeftHandDecapoid
      LegRight: RightLegDecapoid
      LegLeft: LeftLegDecapoid
      FootRight: RightFootDecapoid
      FootLeft: LeftFootDecapoid
      Lungs: OrganDecapoidLungs
      Stomach: OrganDecapoidStomach
      Brain: OrganDecapoidBrain
      Eyes: OrganDecapoidEyes
      Tongue: OrganDecapoidTongue
      Appendix: OrganDecapoidAppendix
      Ears: OrganDecapoidEars
      Heart: OrganDecapoidHeart
      Liver: OrganDecapoidLiver
      Kidneys: OrganDecapoidKidneys
  - type: HumanoidProfile
    species: Decapoid

- type: entity
  parent:
  - AppearanceDecapoid
  - BaseSpeciesMobOrganic
  id: MobDecapoid
  name: Urist McCrab
  components:
  - type: SpeechRequiresEquipment
    equipment:
      mask:
        tags:
        - Vaporizer
    failMessage: decapoid-cant-speak
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepDecapoid
  - type: Butcherable # No bones. No I didn't forget go fuck yourself.
    butcheringType: Spike
    spawned:
    - id: FoodMeatCrab # maybe custom someday. as-is, it's fine
      amount: 3
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 210 # they're a little heavier than everyone else.
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageModifierSet: Decapoid
  - type: Injurable
    damageContainer: Biological
  - type: Vocal
    sounds:
      Male: UnisexDecapoid
      Female: UnisexDecapoid
      Unsexed: UnisexDecapoid # male and female sounds have to 1) exist and 2) come first, otherwise urists will spawn without emote sounds 66% of the time, because this game is poorly programmed
  - type: MovementSpeedModifier
    weightlessAcceleration: 1.5 # move more easily in space
    weightlessFrictionNoInput: 2 # more control over movement in space
    weightlessModifier: 1
  - type: TemperatureDamage
    heatDamageThreshold: 380 # slightly more vulnerable to heat
    coldDamageThreshold: 0 # immune to cold
    coldDamage:
      types:
        Cold : 0 # immune to cold
    heatDamage:
      types:
        Heat : 1
  - type: Temperature
    currentTemperature: 310
    specificHeat: 42
  - type: TemperatureSpeed
    thresholds: # lol
      293: 1.0
      280: 1.0
      260: 1.0
  - type: Clumsy
    clumsySound:
      path: /Audio/_Impstation/Effects/Clumsy/crab_snap.ogg
    clumsyHypo: false
    clumsyVaulting: false
    clumsyDefib: false
    gunFailedMessage: gun-clumsy-decapoid # The gun slips out of your claws!
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: CopperBlood # real life crustaceans are in the same clade as spiders and share a blood type
        Quantity: 300
  - type: Puller
    needsHands: false # they drag with the claw, or their back legs
    applySpeedModifier: false # they're strong as fuck. also i made this variable just for them.
  - type: Speech
    speechSounds: Decapoid
  - type: TypingIndicator
    proto: robot
  - type: Exoskeleton # Prevents injections with syringes. Ideally it'd be on their body parts instead but eh.


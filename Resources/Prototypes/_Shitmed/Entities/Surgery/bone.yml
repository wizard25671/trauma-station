- type: entity
  id: Bone
  parent: BaseItem
  name: bone
  description: A real bone. Contains calcium, a lot of calcium.
  components:
  - type: Bone
  - type: Sprite
    sprite: _Trauma/Objects/Materials/materials.rsi
    state: bones
  - type: Appearance
  - type: Item
    sprite: _Trauma/Objects/Materials/materials.rsi
    size: Normal
  - type: Tag
    tags:
      - RawMaterial
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic

- type: entity
  id: BoneNeck
  parent: Bone
  name: neck bone
  description: A bone from the neck. Contains a lot of calcium.
  components:
  - type: Bone
    integrityCap: 100
    boneIntegrity: 100

- type: entity
  id: BoneWeak
  parent: Bone
  components:
  - type: Bone
    integrityCap: 40
    boneIntegrity: 40

- type: entity
  id: BoneNeckWeak
  parent: BoneNeck
  components:
  - type: Bone
    integrityCap: 60
    boneIntegrity: 60
